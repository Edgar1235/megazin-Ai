<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
    <title>MARKET OS | Меблі</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: url('img/космонавт.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        /* --- ВЕРХНЯ ПАНЕЛЬ (Як у продуктах) --- */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 140, 0, 0.9); /* Помаранчевий для меблів */
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }

        .back-btn {
            text-decoration: none;
            color: white;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 14px;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.4); transform: translateX(-5px); }

        /* --- КОШИК (Стиль як у продуктах) --- */
        .cart-link { text-decoration: none; color: white; }

        .cart-container {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2ECC71;
            padding: 8px 18px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .cart-count {
            background: #FF8C00;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            right: -5px;
            border: 2px solid white;
        }

        /* --- СІТКА ТОВАРІВ --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(16, 34, 55, 0.9);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .product-img-box {
            width: 80px;
            height: 100px;
            background: white; /* Білий фон для меблів краще */
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .product-img-box img {
            width: 90%;
            height: 90%;
            object-fit: contain; 
        }

        .product-main { flex-grow: 1; }
        .product-name { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
        .brand-name { font-size: 11px; color: #FF8C00; font-weight: 600; margin-bottom: 15px; }

        .price-details { font-size: 12px; color: #aaa; line-height: 1.8; }
        .price-details b { color: #fff; }

        .product-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 15px;
        }

        .btn-add {
            background: #2ECC71;
            color: white; border: none;
            padding: 10px 0; width: 100%;
            border-radius: 6px; font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover { background: #27ae60; transform: scale(1.05); }
    </style>
</head>
<body>

    <header class="nav-bar">
        <div class="nav-left">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> НАЗАД</a>
            <h2 style="letter-spacing: 1px;"><i class="fas fa-chair"></i> СКЛАД МЕБЛІВ</h2>
        </div>

        <a href="cart.html" class="cart-link">
            <div class="cart-container">
                <span class="cart-total" id="cart-total-nav">$0.00</span>
                <div style="position: relative;">
                    <i class="fas fa-shopping-cart cart-icon"></i>
                    <span class="cart-count" id="cart-count-nav">0</span>
                </div>
            </div>
        </a>
    </header>

    <div class="products-grid" id="furnitureGrid"></div>

    <script>
        const furniture = [
            { n: "Стелаж металевий", p: 45.00, i: "img/metalfor.jpg", cat: "Стелажі" },
            { n: "Дерев'яний стіл", p: 120.50, i: "img/tableder.webp", cat: "Столи" },
            { n: "Офісний стілець", p: 85.00, i: "img/шкіряне крісло.jpg", cat: "Крісла" },
            { n: "Холодильна вітрина", p: 450.00, i: "img/холодильник.webp", cat: "Обладнання" },
            { n: "Касовий стіл", p: 210.00, i: "img/casa.webp", cat: "Столи" },
            { n: "Полиця для хліба", p: 35.20, i: "img/полиця для хліба.webp", cat: "Полиці" }
        ];

        const grid = document.getElementById('furnitureGrid');

        furniture.forEach(item => {
            grid.innerHTML += `
                <div class="product-card">
                    <div class="product-img-box">
                        <img src="${item.i}" alt="${item.n}">
                    </div>
                    <div class="product-main">
                        <div class="product-name">${item.n}</div>
                        <div class="brand-name">${item.cat}</div>
                        <div class="price-details">
                            Місце: <b>Склад</b><br>
                            Ціна: <b>$<span class="product-price">${item.p.toFixed(2)}</span></b>
                        </div>
                    </div>
                    <div class="product-side">
                        <button class="btn-add" onclick="buyItem(this)">КУПИТИ</button>
                    </div>
                </div>
            `;
        });

        // Функція для купівлі
        function buyItem(button) {
            addToCart(button); // Основна функція з cart.js
            setTimeout(updateFurnitureNav, 100); // Оновлення цифр на сторінці
        }

        function updateFurnitureNav() {
            const cart = JSON.parse(localStorage.getItem('marketCart')) || [];
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total-nav').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-count-nav').innerText = cart.length;
        }

        // Оновити при завантаженні
        updateFurnitureNav();
    </script>

    <script src="cart.js"></script>
</body>
</html>
