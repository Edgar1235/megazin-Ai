<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Market OS | Мої Замовлення</title>
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #090a0f; color: white; padding: 40px; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        .order-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #2ecc71;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; color: #2ecc71; }
        .btn-back {
            background: #3498db; color: white; padding: 10px 20px;
            text-decoration: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Історія замовлень</h1>
        <div id="orders-list"></div>
        <br>
        <a href="index.html" class="btn-back">⬅ Повернутися в OS</a>
    </div>

    <script>
        function displayOrders() {
            const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
            const list = document.getElementById('orders-list');

            if (history.length === 0) {
                list.innerHTML = "<p>Ви ще нічого не купували.</p>";
                return;
            }

            history.reverse().forEach(order => {
                let itemsHtml = order.items.map(i => `<li>${i.name} - $${i.price}</li>`).join('');
                list.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span>📅 ${order.date}</span>
                            <span>Сума: $${order.total.toFixed(2)}</span>
                        </div>
                        <ul>${itemsHtml}</ul>
                        <p style="color: #aaa; font-size: 12px;">Статус: <span style="color: #2ecc71;">Доставлено</span></p>
                    </div>
                `;
            });
        }
        displayOrders();
    </script>
</body>
</html>
