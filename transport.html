<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MARKET OS | Транспорт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');
        body { background: url('img/космонавт.jpg') no-repeat center/cover fixed; font-family: 'Montserrat', sans-serif; color: white; margin: 20px; }
        .nav { display: flex; justify-content: space-between; background: rgba(231, 76, 60, 0.9); padding: 12px 25px; border-radius: 12px; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .os-logo { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .os-logo img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .cart-container { display: flex; align-items: center; gap: 10px; background: #2ECC71; padding: 8px 18px; border-radius: 10px; transition: 0.3s; position: relative; text-decoration: none; color: white; }
        .cart-count { background: #e74c3c; color: white; font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 50%; position: absolute; top: -5px; right: -5px; border: 2px solid white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: rgba(16, 34, 55, 0.9); padding: 15px; border-radius: 15px; display: flex; gap: 10px; border: 1px solid #e74c3c; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
        .img-box { width: 80px; height: 100px; background: white; border-radius: 8px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 90%; height: 90%; object-fit: contain; }
        .btn { background: #2ECC71; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #27ae60; transform: scale(1.05); }
        a { color: white; text-decoration: none; font-weight: bold; }
        .back-btn { background: rgba(255, 255, 255, 0.2); padding: 8px 15px; border-radius: 8px; font-size: 14px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> НАЗАД</a>
    <div class="os-logo">
        <img src="img/космонавт.jpg" alt="Logo"> MARKET OS | ТРАНСПОРТ
    </div>
    <a href="cart.html" class="cart-container">
        <span id="cart-total-nav">$0.00</span>
        <div style="position: relative;">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cart-count-nav">0</span>
        </div>
    </a>
</div>

<div class="grid" id="transportGrid"></div>

<script>
    const vehicles = [
        { n: "Скейтборд", p: 50.00, i: "img/skejt.webp", cat: "Легкий" },
        { n: "Електро Велосипед", p: 250.00, i: "img/велосипед.jpeg", cat: "Двоколісний" },
        { n: "Електросамокат", p: 400.00, i: "img/електро самокат.jpeg", cat: "Електро" },
        { n: "Мотоцикл", p: 1500.00, i: "img/мотоцикл.jpeg", cat: "Швидкий" },
        { n: "Автомобіль", p: 12000.00, i: "img/авто.jpeg", cat: "Сімейний" },
        { n: "Вантажівка", p: 25000.00, i: "img/фура.jpeg", cat: "Важкий" }
    ];

    const grid = document.getElementById('transportGrid');

    vehicles.forEach(item => {
        grid.innerHTML += `
            <div class="card">
                <div class="img-box"><img src="${item.i}" alt="${item.n}"></div>
                <div style="flex:1">
                    <b class="product-name">${item.n}</b><br>
                    <small style="color: #e74c3c; font-weight: 600;">${item.cat}</small><br><br>
                    <b>$<span class="product-price">${item.p.toFixed(2)}</span></b>
                </div>
                <div style="width:100px; display:flex; flex-direction:column; justify-content:center;">
                    <button class="btn" onclick="buyVehicle(this)">КУПИТИ</button>
                </div>
            </div>`;
    });

    function buyVehicle(button) {
        if (typeof addToCart === "function") {
            addToCart(button);
            setTimeout(updateTransportNav, 100);
        } else {
            alert("Помилка: файл cart.js не знайдено!");
        }
    }

    function updateTransportNav() {
        const cart = JSON.parse(localStorage.getItem('marketCart')) || [];
        const total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0);
        document.getElementById('cart-total-nav').innerText = `$${total.toFixed(2)}`;
        document.getElementById('cart-count-nav').innerText = cart.length;
    }

    updateTransportNav();
</script>

<script src="cart.js"></script>
</body>
</html>
