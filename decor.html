<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
    <title>MARKET OS | Декор та Ремонт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: url('img/космонавт.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        /* --- ВЕРХНЯ ПАНЕЛЬ (Фіолетовий стиль для декору) --- */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(155, 89, 182, 0.9); /* Фіолетовий */
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }

        .back-btn {
            text-decoration: none;
            color: white;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 14px;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.4); transform: translateX(-5px); }

        /* --- КОШИК (Стиль як у продуктах) --- */
        .cart-link { text-decoration: none; color: white; }

        .cart-container {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2ECC71;
            padding: 8px 18px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .cart-count {
            background: #e74c3c;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            right: -5px;
            border: 2px solid white;
        }

        /* --- СІТКА ТОВАРІВ --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(16, 34, 55, 0.9);
            border: 1px solid rgba(155, 89, 182, 0.3);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            gap: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .product-img-box {
            width: 80px;
            height: 100px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            flex-shrink: 0;
        }

        .product-img-box img {
            width: 90%;
            height: 90%;
            object-fit: contain; 
        }

        .product-main { flex-grow: 1; }
        .product-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .category-name { font-size: 11px; color: #9b59b6; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; }

        .price-details { font-size: 12px; color: #aaa; }
        .price-details b { color: #fff; font-size: 16px; }

        .product-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 10px;
        }

        .btn-add {
            background: #2ECC71;
            color: white; border: none;
            padding: 10px 0; width: 100%;
            border-radius: 6px; font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover { background: #27ae60; transform: scale(1.05); }
    </style>
</head>
<body>

    <header class="nav-bar">
        <div class="nav-left">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> НАЗАД</a>
            <h2 style="letter-spacing: 1px;"><i class="fas fa-paint-roller"></i> ДЕКОР ТА РЕМОНТ</h2>
        </div>

        <a href="cart.html" class="cart-link">
            <div class="cart-container">
                <span class="cart-total" id="cart-total-nav">$0.00</span>
                <div style="position: relative;">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count-nav">0</span>
                </div>
            </div>
        </a>
    </header>

    <div class="products-grid" id="decorGrid"></div>

    <script>
        const decors = [
            { n: "Фарба біла", p: 15.00, i: "img/біла фарба.jpeg", cat: "Фарба" },
            { n: "Фарба синя", p: 18.50, i: "img/синя фарба.jpeg", cat: "Фарба" },
            { n: "Фарба червона", p: 18.50, i: "img/червона фарба.jpeg", cat: "Фарба" },
            { n: "Ламінат (Дуб)", p: 20.00, i: "img/ламінад дуб.jpeg", cat: "Підлога" },
            { n: "Плитка сіра", p: 28.00, i: "img/сіра плита.jpeg", cat: "Підлога" },
            { n: "Картина Modern", p: 25.00, i: "img/картина.jpg", cat: "Декор" },
            { n: "Ваза керамічна", p: 15.50, i: "img/ваза.jpeg", cat: "Декор" },
            { n: "Настільна лампа", p: 40.00, i: "img/настільна лампа.jpeg", cat: "Декор" },
            { n: "Квітка в горщику", p: 12.00, i: "img/квіти.jpeg", cat: "Декор" },
            { n: "Настінний годинник", p: 22.00, i: "img/годинник.jpg", cat: "Декор" },
            { n: "Свічник", p: 8.50, i: "img/свічка.jpeg", cat: "Декор" }
        ];

        const grid = document.getElementById('decorGrid');

        decors.forEach(item => {
            grid.innerHTML += `
                <div class="product-card">
                    <div class="product-img-box">
                        <img src="${item.i}" alt="${item.n}">
                    </div>
                    <div class="product-main">
                        <div class="product-name">${item.n}</div>
                        <div class="category-name">${item.cat}</div>
                        <div class="price-details">
                            Ціна: <b>$<span class="product-price">${item.p.toFixed(2)}</span></b>
                        </div>
                    </div>
                    <div class="product-side">
                        <button class="btn-add" onclick="buyItem(this)">КУПИТИ</button>
                    </div>
                </div>
            `;
        });

        // Функція для купівлі
        function buyItem(button) {
            if (typeof addToCart === "function") {
                addToCart(button); 
                setTimeout(updateDecorNav, 100);
            }
        }

        function updateDecorNav() {
            const cart = JSON.parse(localStorage.getItem('marketCart')) || [];
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total-nav').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-count-nav').innerText = cart.length;
        }

        // Оновити при завантаженні
        updateDecorNav();
    </script>

    <script src="cart.js"></script>
</body>
</html>
